<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ağıllı Skaner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #reader { width: 100%; max-width: 500px; display: none; }
        .main-ui { text-align: center; }
        .btn-start { padding: 15px 30px; background: #f39c12; border: none; border-radius: 5px; color: white; cursor: pointer; font-size: 18px; }
        #actions { display: none; margin-top: 20px; gap: 10px; }
        .btn { padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; }
        #btnOpen { background: #27ae60; }
        #btnShare { background: #3498db; }
    </style>
</head>
<body>

    <div id="startScreen" class="main-ui">
        <h1>QR Kodu oxucu</h1>
        <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="scanFile(this)">
        <button class="btn-start" onclick="activateScanner()">Üzərinə vur (Kamera)</button>
        <br><br>
        <button class="btn-start" onclick="document.getElementById('fileInput').click()">Qalereyadan seç</button>
    </div>

    <div id="reader"></div>
    
    <div id="actions">
        <button id="btnOpen" class="btn" onclick="openLink()">Aç</button>
        <button id="btnShare" class="btn" onclick="shareResult()">Paylaş</button>
    </div>

    <script>
        let html5QrCode = new Html5Qrcode("reader");
        let lastResult = "";

        function activateScanner() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('reader').style.display = 'block';
            
            html5QrCode.start(
                { facingMode: { ideal: "environment" } },
                { fps: 10, qrbox: 250 },
                (decodedText) => { handleResult(decodedText); }
            ).catch(err => alert("Kamera icazəsi tələb olunur!"));
        }

        function handleResult(text) {
            lastResult = text;
            document.getElementById('actions').style.display = "flex";
            document.getElementById('btnOpen').innerText = "Aç: " + (text.length > 15 ? text.substring(0, 15) + "..." : text);
        }

        function scanFile(input) {
            if (input.files && input.files[0]) {
                document.getElementById('startScreen').style.display = 'none';
                document.getElementById('reader').style.display = 'block';
                html5QrCode.scanFile(input.files[0], true)
                    .then(decodedText => { handleResult(decodedText); })
                    .catch(() => alert("Şəkildə QR kod tapılmadı."));
            }
        }

        function openLink() { 
            if(lastResult.startsWith('http')) window.location.href = lastResult;
            else alert("Mətn: " + lastResult);
        }

        function shareResult() {
            if (navigator.share) {
                navigator.share({ title: 'QR Nəticəsi', url: lastResult })
                    .catch(err => alert("Paylaşım alınmadı."));
            } else {
                alert("Nəticə: " + lastResult);
            }
        }
    </script>
</body>
</html>
