<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ağıllı Skaner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        /* Reader-i tam ekran etmək üçün */
        #reader { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; display: none; z-index: 1; }
        #reader video { width: 100%; height: 100%; object-fit: cover; }
        
        .main-ui { text-align: center; z-index: 5; }
        .btn-start { padding: 15px 30px; background: #f39c12; border: none; border-radius: 5px; color: white; cursor: pointer; font-size: 18px; margin: 10px; }
        .top-controls { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; z-index: 10; }
        .icon-btn { color: white; cursor: pointer; background: none; border: none; font-size: 14px; }
        
        #actions { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; max-width: 300px; z-index: 20; flex-direction: column; gap: 15px; background: rgba(0,0,0,0.85); padding: 20px; border-radius: 10px; }
        .btn { padding: 15px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; width: 100%; font-size: 16px; }
        #btnOpen { background: #27ae60; }
        #btnShare { background: #3498db; }
    </style>
</head>
<body>

    <div class="top-controls">
        <button class="icon-btn" onclick="document.getElementById('fileInput').click()">🖼️<br>Qalereya</button>
        <button class="icon-btn" onclick="window.location.href='https://elimeherremov.taplink.ws/'">❓<br>Yardım</button>
    </div>

    <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="scanFile(this)">

    <div id="startScreen" class="main-ui">
        <h1>QR Kodu oxucu</h1>
        <button class="btn-start" onclick="showOptions()">Üzərinə vur</button>
        <div id="options" style="display:none;">
            <button class="btn-start" onclick="activateScanner()">Kamera ilə</button>
            <button class="btn-start" onclick="document.getElementById('fileInput').click()">Qalereyadan</button>
        </div>
    </div>

    <div id="reader"></div>
    <div id="actions">
        <button id="btnOpen" class="btn" onclick="openLink()">Aç</button>
        <button id="btnShare" class="btn" onclick="shareResult()">Paylaş</button>
    </div>

    <script>
        let html5QrCode = new Html5Qrcode("reader");
        let lastResult = "";

        function showOptions() { document.getElementById('options').style.display = 'block'; }

        function activateScanner() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('reader').style.display = 'block';
            
            // Tam ekran tarama (qrbox-u null edərək bütün sahəni istifadə edirik)
            html5QrCode.start(
                { facingMode: { ideal: "environment" } },
                { fps: 30, qrbox: null, aspectRatio: 1.0 }, 
                (decodedText) => { 
                    handleResult(decodedText); 
                    html5QrCode.stop(); 
                }
            ).catch(err => alert("Kamera icazəsi tələb olunur!"));
        }

        function handleResult(text) {
            lastResult = text;
            document.getElementById('actions').style.display = "flex";
            document.getElementById('btnOpen').innerText = "Aç: " + (text.length > 20 ? text.substring(0, 20) + "..." : text);
        }

        function scanFile(input) {
            if (input.files && input.files[0]) {
                // Şəkil üçün çox daha geniş toleranslı tarama
                html5QrCode.scanFile(input.files[0], true)
                    .then(decodedText => { handleResult(decodedText); })
                    .catch(() => {
                        // Xəta vermək əvəzinə yenidən cəhd etməyə imkan veririk
                        alert("Şəkil oxuna bilmədi, lütfən daha aydın bir QR kod seçin.");
                    });
            }
        }

        function openLink() { 
            if(lastResult.startsWith('http')) window.open(lastResult, '_blank');
            else alert("Mətn: " + lastResult);
        }

        function shareResult() {
            if (navigator.share) {
                navigator.share({ title: 'QR Nəticəsi', url: lastResult }).catch(err => {});
            } else {
                prompt("Linki kopyalayın:", lastResult);
            }
        }
    </script>
</body>
</html>
