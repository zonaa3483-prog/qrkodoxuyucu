<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ağıllı Skaner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #reader { width: 100%; max-width: 500px; display: none; }
        .main-ui { text-align: center; }
        .btn-start { padding: 15px 30px; background: #f39c12; border: none; border-radius: 5px; color: white; cursor: pointer; font-size: 18px; margin-top: 20px; }
        .top-controls { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; }
        .icon-btn { color: white; cursor: pointer; background: none; border: none; font-size: 14px; }
        #btnOpen { margin-top: 20px; padding: 10px 20px; background: #27ae60; border: none; border-radius: 5px; color: white; display: none; }
    </style>
</head>
<body>

    <div class="top-controls">
        <button class="icon-btn" onclick="document.getElementById('fileInput').click()">🖼️<br>Qalereya</button>
        <button class="icon-btn" onclick="window.location.href='https://elimeherremov.taplink.ws/'">❓<br>Yardım</button>
    </div>

    <div id="startScreen" class="main-ui">
        <h1>QR Kodu oxucu</h1>
        <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="scanFile(this)">
        <button class="btn-start" onclick="activateScanner()">Üzərinə vur</button>
    </div>

    <div id="reader"></div>
    <button id="btnOpen" onclick="openLink()">Aç</button>

    <script>
        let html5QrCode = new Html5Qrcode("reader");
        let lastResult = "";

        function activateScanner() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('reader').style.display = 'block';
            
            html5QrCode.start(
                { facingMode: { ideal: "environment" } },
                { fps: 10, qrbox: 250 },
                (decodedText) => { handleResult(decodedText); }
            ).catch(err => alert("Kamera xətası: " + err));
        }

        function handleResult(text) {
            lastResult = text;
            const btn = document.getElementById('btnOpen');
            btn.style.display = "block";
            btn.innerText = "Aç: " + (text.length > 15 ? text.substring(0, 15) + "..." : text);
        }

        function scanFile(input) {
            if (input.files && input.files[0]) {
                html5QrCode.scanFile(input.files[0], true)
                    .then(decodedText => { handleResult(decodedText); })
                    .catch(() => alert("Şəkildə QR kod tapılmadı."));
            }
        }

        function openLink() { 
            if(lastResult.startsWith('http')) window.location.href = lastResult;
            else alert("Mətn: " + lastResult);
        }
    </script>
</body>
</html>
