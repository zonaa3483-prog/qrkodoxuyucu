<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ağıllı Skaner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Skaner sahəsini tam mərkəzləşdiririk */
        #reader { flex-grow: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        
        /* QR çərçivəsini ağ rəngdə və mərkəzdə saxlamaq üçün stil */
        #reader__scan_region { border: 2px solid white !important; border-radius: 10px; }

        .top-controls { display: flex; justify-content: space-around; padding: 20px; background: rgba(0,0,0,0.6); position: absolute; top: 0; width: 100%; z-index: 10; }
        .icon-btn { text-align: center; font-size: 12px; cursor: pointer; color: white; border: none; background: none; }
        
        .bottom-controls { position: absolute; bottom: 40px; width: 100%; text-align: center; z-index: 10; }
        .zoom-controls { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 15px; font-size: 18px; font-weight: bold; }
        .btn { padding: 10px 25px; background: #f39c12; border: none; border-radius: 5px; color: white; cursor: pointer; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="top-controls">
        <button class="icon-btn" onclick="toggleFlash()">💡<br>Flaş</button>
        <button class="icon-btn" onclick="document.getElementById('fileInput').click()">🖼️<br>Qalereya</button>
        <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="scanFile(this)">
        <button class="icon-btn" onclick="window.location.href='https://elimeherremov.taplink.ws/'">❓<br>Yardım</button>
    </div>

    <div id="reader"></div>

    <div class="bottom-controls">
        <div class="zoom-controls">
            <span onclick="changeZoom(-0.5)" style="cursor:pointer">-</span>
            <span>Zoom</span>
            <span onclick="changeZoom(0.5)" style="cursor:pointer">+</span>
        </div>
        <button id="btnOpen" class="btn" onclick="openLink()">Aç</button>
    </div>

    <script>
        let html5QrCode = new Html5Qrcode("reader");
        let lastResult = "";

        // Kamera icazəsi və başlanğıc
        function startScanner() {
            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: {width: 250, height: 250} }, // Kvadrat ölçüsü
                (decodedText) => {
                    lastResult = decodedText;
                    document.getElementById('btnOpen').style.display = "inline-block";
                    document.getElementById('btnOpen').innerText = "Aç: " + decodedText.substring(0, 10) + "...";
                }
            ).catch(err => alert("Kamera tapılmadı və ya icazə verilmədi."));
        }

        // Başlanğıc üçün düymə
        window.onload = () => {
            const btn = document.createElement("button");
            btn.innerText = "Skaneri Başlat";
            btn.style = "position:absolute; top:50%; left:35%; padding:15px; z-index:20; background:#f39c12; color:white; border:none; border-radius:5px;";
            btn.onclick = () => { startScanner(); btn.style.display = "none"; };
            document.body.appendChild(btn);
        };

        function scanFile(input) {
            if (input.files && input.files[0]) {
                html5QrCode.scanFile(input.files[0], true)
                    .then(decodedText => { window.location.href = decodedText; })
                    .catch(err => alert("Şəkildə QR kod tapılmadı."));
            }
        }

        function changeZoom(val) {
            const reader = document.getElementById('reader');
            let currentScale = reader.style.transform ? parseFloat(reader.style.transform.replace('scale(', '')) : 1;
            let newScale = Math.min(Math.max(currentScale + val, 1), 3);
            reader.style.transform = `scale(${newScale})`;
        }

        function openLink() { if(lastResult) window.location.href = lastResult; }
    </script>
</body>
</html>
