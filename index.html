<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ağıllı Skaner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        /* Skaner Konteyneri */
        #reader { flex-grow: 1; position: relative; }
        
        /* Üst İkonlar (Aydınlıq, Görünüştara, Yardım) */
        .top-controls { display: flex; justify-content: space-around; padding: 20px; background: rgba(0,0,0,0.6); position: absolute; top: 0; width: 100%; z-index: 10; }
        .icon-btn { text-align: center; font-size: 12px; cursor: pointer; }
        
        /* Alt İdarəetmə (Zoom və Link) */
        .bottom-controls { position: absolute; bottom: 40px; width: 100%; text-align: center; z-index: 10; }
        .zoom-container { padding: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .zoom-slider { width: 70%; accent-color: #f39c12; }
        
        .btn { padding: 10px 20px; background: #f39c12; border: none; border-radius: 5px; color: white; cursor: pointer; display: none; }
    </style>
</head>
<body>

    <div class="top-controls">
        <div class="icon-btn">💡<br>Aydınlıq</div>
        <div class="icon-btn">🖼️<br>Görüntü Tara</div>
        <div class="icon-btn">❓<br>Yardım</div>
    </div>

    <div id="reader"></div>

    <div class="bottom-controls">
        <div class="zoom-container">
            <span>🔍</span>
            <input type="range" class="zoom-slider" min="1" max="5" value="1">
            <span>🔍</span>
        </div>
        <button id="btnOpen" class="btn" onclick="openLink()">Linkə Get</button>
    </div>

    <script>
        let lastResult = "";
        const html5QrCode = new Html5Qrcode("reader");

        // Kameranı başlat
        Html5QrCode.getCameras().then(devices => {
            if (devices && devices.length) {
                html5QrCode.start(
                    { facingMode: "environment" },
                    { fps: 10, qrbox: {width: 250, height: 250} },
                    (decodedText) => {
                        lastResult = decodedText;
                        document.getElementById('btnOpen').style.display = "inline-block";
                        document.getElementById('btnOpen').innerText = "Aç: " + decodedText.substring(0, 15) + "...";
                    }
                );
            }
        });

        function openLink() { window.location.href = lastResult; }
    </script>
</body>
</html>
