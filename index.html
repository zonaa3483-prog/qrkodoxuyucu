<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ağıllı Skaner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #reader { flex-grow: 1; position: relative; }
        #reader video { width: 100%; height: 100%; object-fit: cover; }
        
        #reader__scan_region { border: 2px solid white !important; border-radius: 10px; }

        .top-controls { display: flex; justify-content: space-around; padding: 20px; background: rgba(0,0,0,0.4); position: absolute; top: 0; width: 100%; z-index: 10; }
        .icon-btn { text-align: center; font-size: 12px; cursor: pointer; color: white; border: none; background: none; }
        
        .bottom-controls { position: absolute; bottom: 40px; width: 100%; text-align: center; z-index: 10; }
        .zoom-slider { width: 70%; accent-color: #f39c12; margin-bottom: 20px; }
        .btn { padding: 10px 25px; background: #f39c12; border: none; border-radius: 5px; color: white; cursor: pointer; display: none; font-weight: bold; font-size: 16px; }
        
        /* Təlimat mətni üçün üslub */
        #instruction { position: absolute; top: 40%; width: 100%; text-align: center; color: #fff; font-size: 18px; z-index: 5; pointer-events: none; padding: 0 20px; text-shadow: 1px 1px 2px black; }
    </style>
</head>
<body>

    <div class="top-controls">
        <button class="icon-btn" onclick="toggleFlash()">💡<br>Flaş</button>
        <button class="icon-btn" onclick="document.getElementById('fileInput').click()">🖼️<br>Qalereya</button>
        <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="scanFile(this)">
        <button class="icon-btn" onclick="window.location.href='https://elimeherremov.taplink.ws/'">❓<br>Yardım</button>
    </div>

    <div id="instruction">Ya QR kodu skan et, ya da Qalereyaya toxunub şəkil seç.</div>

    <div id="reader"></div>

    <div class="bottom-controls">
        <input type="range" class="zoom-slider" min="1" max="3" step="0.1" value="1" oninput="applyZoom(this.value)">
        <br>
        <button id="btnOpen" class="btn" onclick="openLink()">Aç</button>
    </div>

    <script>
        let html5QrCode = new Html5Qrcode("reader");
        let lastResult = "";
        let isFlashOn = false;

        async function startScanner() {
            try {
                // Kamera və flaş dəstəyi üçün icazə tələbi
                const devices = await Html5Qrcode.getCameras();
                if (devices && devices.length > 0) {
                    const config = { fps: 15, qrbox: {width: 250, height: 250}, aspectRatio: 1.0 };
                    
                    html5QrCode.start(
                        { facingMode: { ideal: "environment" } }, 
                        config,
                        (decodedText) => {
                            handleResult(decodedText);
                        }
                    );
                    document.getElementById('instruction').style.display = "none";
                }
            } catch (err) {
                alert("Kamera işə salına bilmədi. Zəhmət olmasa icazələri yoxlayın.");
            }
        }

        function handleResult(text) {
            lastResult = text;
            const btn = document.getElementById('btnOpen');
            btn.style.display = "inline-block";
            btn.innerText = "Aç: " + (text.length > 15 ? text.substring(0, 15) + "..." : text);
            document.getElementById('instruction').style.display = "none";
        }

        function toggleFlash() {
            isFlashOn = !isFlashOn;
            // Flaşın aktivləşməsi üçün constraints
            html5QrCode.applyVideoConstraints({ advanced: [{ torch: isFlashOn }] })
                .catch(() => alert("Flaş bu cihazda dəstəklənmir."));
        }

        function applyZoom(val) {
            const video = document.querySelector("#reader video");
            if (video) video.style.transform = `scale(${val})`;
        }

        function scanFile(input) {
            if (input.files && input.files[0]) {
                html5QrCode.scanFile(input.files[0], true)
                    .then(decodedText => {
                        handleResult(decodedText);
                    })
                    .catch(() => alert("Şəkildə QR kod tapılmadı."));
            }
        }

        function openLink() { 
            if(lastResult) {
                if(lastResult.startsWith('http')) {
                    window.location.href = lastResult;
                } else {
                    alert("Mətn: " + lastResult);
                }
            }
        }

        window.onload = () => {
            const btn = document.createElement("button");
            btn.innerText = "Skaneri Başlat";
            btn.style = "position:absolute; top:50%; left:30%; padding:15px; z-index:20; background:#f39c12; border:none; border-radius:5px; color:white; font-size:16px;";
            btn.onclick = () => { startScanner(); btn.style.display = "none"; };
            document.body.appendChild(btn);
        };
    </script>
</body>
</html>
