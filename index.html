<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ağıllı Skaner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Kamera ekranı tam doldursun */
        #reader { flex-grow: 1; position: relative; }
        #reader video { width: 100%; height: 100%; object-fit: cover; }
        
        /* QR çərçivəsi */
        #reader__scan_region { border: 2px solid white !important; border-radius: 10px; }

        .top-controls { display: flex; justify-content: space-around; padding: 20px; background: rgba(0,0,0,0.4); position: absolute; top: 0; width: 100%; z-index: 10; }
        .icon-btn { text-align: center; font-size: 12px; cursor: pointer; color: white; border: none; background: none; }
        
        .bottom-controls { position: absolute; bottom: 40px; width: 100%; text-align: center; z-index: 10; }
        .zoom-slider { width: 70%; accent-color: #f39c12; margin-bottom: 20px; }
        .btn { padding: 10px 25px; background: #f39c12; border: none; border-radius: 5px; color: white; cursor: pointer; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="top-controls">
        <button class="icon-btn" onclick="toggleFlash()">💡<br>Flaş</button>
        <button class="icon-btn" onclick="document.getElementById('fileInput').click()">🖼️<br>Qalereya</button>
        <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="scanFile(this)">
        <button class="icon-btn" onclick="window.location.href='https://elimeherremov.taplink.ws/'">❓<br>Yardım</button>
    </div>

    <div id="reader"></div>

    <div class="bottom-controls">
        <input type="range" class="zoom-slider" min="1" max="3" step="0.1" value="1" oninput="applyZoom(this.value)">
        <br>
        <button id="btnOpen" class="btn" onclick="openLink()">Aç</button>
    </div>

    <script>
        let html5QrCode = new Html5Qrcode("reader");
        let lastResult = "";
        let isFlashOn = false;

        function startScanner() {
            Html5Qrcode.getCameras().then(devices => {
                if (devices && devices.length > 0) {
                    // Cihazdaki arka kamerayı bulmaya çalış
                    let cameraId = devices.find(d => /back|rear|environment/i.test(d.label))?.id || devices[devices.length - 1].id;
                    
                    html5QrCode.start(
                        { deviceId: { exact: cameraId } },
                        { fps: 10, qrbox: {width: 250, height: 250}, aspectRatio: 1.0 },
                        (decodedText) => {
                            lastResult = decodedText;
                            document.getElementById('btnOpen').style.display = "inline-block";
                            document.getElementById('btnOpen').innerText = "Aç: " + decodedText.substring(0, 15) + "...";
                        }
                    );
                } else {
                    // Kamera bulunamazsa varsayılan
                    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: {width: 250, height: 250} }, (decodedText) => {
                        lastResult = decodedText;
                        document.getElementById('btnOpen').style.display = "inline-block";
                        document.getElementById('btnOpen').innerText = "Aç: " + decodedText.substring(0, 15) + "...";
                    });
                }
            }).catch(err => {
                html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: {width: 250, height: 250} }, (decodedText) => {
                    lastResult = decodedText;
                    document.getElementById('btnOpen').style.display = "inline-block";
                    document.getElementById('btnOpen').innerText = "Aç: " + decodedText.substring(0, 15) + "...";
                });
            });
        }

        function toggleFlash() {
            isFlashOn = !isFlashOn;
            html5QrCode.applyVideoConstraints({ advanced: [{ torch: isFlashOn }] })
                .catch(err => alert("Cihazda flaş dəstəklənmir."));
        }

        function applyZoom(val) {
            const video = document.querySelector("#reader video");
            if (video) video.style.transform = `scale(${val})`;
        }

        function scanFile(input) {
            if (input.files[0]) {
                html5QrCode.scanFile(input.files[0], true)
                    .then(res => window.location.href = res)
                    .catch(() => alert("Kod tapılmadı."));
            }
        }

        function openLink() { if(lastResult) window.location.href = lastResult; }

        window.onload = () => {
            const btn = document.createElement("button");
            btn.innerText = "Skaneri Başlat";
            btn.style = "position:absolute; top:50%; left:35%; padding:15px; z-index:20; background:#f39c12; border:none; border-radius:5px;";
            btn.onclick = () => { startScanner(); btn.style.display = "none"; };
            document.body.appendChild(btn);
        };
    </script>
</body>
</html>
