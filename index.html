<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ağıllı Skaner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #1a1a1a; color: white; }
        #reader { width: 100%; height: 50vh; }
        .controls { padding: 20px; text-align: center; }
        .btn { display: none; padding: 15px 30px; background: #f39c12; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin: 5px; }
        #cameraSelect { padding: 10px; margin: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="reader"></div>
    
    <div class="controls">
        <select id="cameraSelect" style="display:none;"></select>
        <p id="status">Kodu oxumaq üçün kameranı açın.</p>
        <button id="btnOpenInternal" class="btn" onclick="openInternal()">Tətbiqdə Aç</button>
        <button id="btnOpenExternal" class="btn" onclick="openExternal()">Brauzerdə (Chrome) Aç</button>
    </div>

    <script>
        let lastResult = "";
        const html5QrCode = new Html5Qrcode("reader");

        // Kamerayı başlatma fonksiyonu
        function startScanner(cameraId) {
            html5QrCode.start(
                cameraId, 
                { fps: 10, qrbox: {width: 250, height: 250} },
                (decodedText) => {
                    lastResult = decodedText;
                    document.getElementById('status').innerText = "Kod tapıldı: " + decodedText;
                    html5QrCode.pause(); // Taramayı durdur
                    document.getElementById('btnOpenInternal').style.display = "inline-block";
                    document.getElementById('btnOpenExternal').style.display = "inline-block";
                }
            );
        }

        // Kamera listesini al ve arka kamerayı seç
        Html5Qrcode.getCameras().then(devices => {
            if (devices && devices.length) {
                // Arka kamerayı bulmaya çalış (genellikle "back" içerir)
                let backCamera = devices.find(d => d.label.toLowerCase().includes('back')) || devices[devices.length - 1];
                
                startScanner(backCamera.id);
            }
        }).catch(err => {
            document.getElementById('status').innerText = "Kamera tapılmadı: " + err;
        });

        function openInternal() { window.location.href = lastResult; }
        function openExternal() { window.open(lastResult, '_system'); }
    </script>
</body>
</html>
