<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ağıllı Skaner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { margin: 0; background: #2c7a73; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Üst Menyu */
        .top-menu { display: flex; justify-content: space-around; padding: 15px; background: #2c7a73; }
        .menu-item { font-size: 14px; opacity: 0.8; cursor: pointer; }

        /* Skaner Sahəsi */
        #reader { flex-grow: 1; position: relative; background: #000; }
        
        /* UI Elementləri */
        .controls-overlay { position: absolute; bottom: 50px; width: 100%; text-align: center; }
        .zoom-slider { width: 80%; accent-color: #f39c12; }
        
        #status { padding: 10px; background: rgba(0,0,0,0.5); }
        .btn-container { margin-top: 10px; }
        .btn { padding: 10px 20px; background: #f39c12; border: none; border-radius: 5px; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-menu">
        <span>Tara</span>
        <span>Oluştur</span>
        <span>Tarih</span>
        <span>Ayarlar</span>
    </div>

    <div id="reader"></div>

    <div class="controls-overlay">
        <input type="range" class="zoom-slider" min="1" max="5" value="1">
        <div id="status">Kodu oxumaq üçün kameranı açın.</div>
        <div class="btn-container">
            <button id="btnOpen" class="btn" style="display:none;" onclick="openLink()">Linkə Get</button>
        </div>
    </div>

    <script>
        let lastResult = "";
        const html5QrCode = new Html5Qrcode("reader");

        // Kamera parametrləri ilə başladılma
        Html5Qrcode.getCameras().then(devices => {
            if (devices && devices.length) {
                html5QrCode.start(
                    { facingMode: "environment" }, // Arka kamera
                    { fps: 10, qrbox: {width: 250, height: 250} },
                    (decodedText) => {
                        lastResult = decodedText;
                        document.getElementById('status').innerText = "Tapıldı: " + decodedText;
                        document.getElementById('btnOpen').style.display = "inline-block";
                    }
                );
            }
        });

        function openLink() { window.location.href = lastResult; }
    </script>
</body>
</html>
